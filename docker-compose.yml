version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_password}
      MYSQL_DATABASE: ${DB_NAME:-mail_service}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail-network

  api:
    image: ${IMAGE}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node src/database/migrate.js && node src/index.js"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - mail-network

  worker:
    image: ${IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "src/workers/emailWorker.js"]
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - mail-network

  bounce-handler:
    image: ${IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "src/workers/bounceHandler.js"]
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - mail-network

volumes:
  db_data:

networks:
  mail-network:
    driver: bridge
