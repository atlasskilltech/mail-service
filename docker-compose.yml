version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mail_service
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  email-api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: mail_service
    depends_on:
      mysql:
        condition: service_healthy
    command: node src/index.js

  email-worker:
    build: .
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: mail_service
    depends_on:
      mysql:
        condition: service_healthy
    command: node src/workers/emailWorker.js

  bounce-handler:
    build: .
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: mail_service
    depends_on:
      mysql:
        condition: service_healthy
    command: node src/workers/bounceHandler.js

volumes:
  mysql_data:
