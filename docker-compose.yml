services:
  api:
    image: ${IMAGE:-mail-service}
    restart: unless-stopped
    ports:
      - "${PORT:-3800}:3000"
    env_file:
      - .env
    command: >
      sh -c "node src/database/migrate.js && node src/index.js"
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    image: ${IMAGE:-mail-service}
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "src/workers/emailWorker.js"]
    deploy:
      resources:
        limits:
          memory: 256M

  bounce-handler:
    image: ${IMAGE:-mail-service}
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "src/workers/bounceHandler.js"]
    deploy:
      resources:
        limits:
          memory: 256M
